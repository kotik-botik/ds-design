<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Профиль — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal должен зарегистрироваться до события -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--dynamic-surface-base-primary); }
  .phone-frame { background: var(--dynamic-surface-base-primary); }

  /* Верхний остров вплотную к навбару — верхние углы 0, высота по контенту */
  .ll-pr-card-island { border-radius: 0 0 20px 20px; padding-top: 0; padding-bottom: 0; height: auto; }

  /* Шапка профиля: имя/статус слева, аватар справа */
  .ll-pr-head {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-4) var(--space-4) var(--space-3);
  }
  .ll-pr-head__body { flex: 1; min-width: 0; }
  .ll-pr-head__name { color: var(--dynamic-text-and-icons-base-primary); }
  .ll-pr-head__status {
    color: var(--dynamic-text-and-icons-base-secondary);
    margin-top: var(--space-1);
  }

  /* Ряд кнопок (primary CTA + 2 circle-action) */
  .ll-pr-cta {
    display: flex; align-items: center; gap: var(--space-2);
    padding: 0 var(--space-4) var(--space-4);
  }

  /* «Меню»: 4 ярлыка с иконкой и подписью (Друзья 5 / Заметки / Фото / Ещё) */
  .ll-pr-menu {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: var(--space-2);
    padding: 0 var(--space-4) var(--space-4);
  }
  .ll-pr-menu__item {
    appearance: none; background: transparent; border: 0; padding: var(--space-2) 0;
    display: flex; flex-direction: column; align-items: center;
    color: var(--dynamic-text-and-icons-base-primary);
    cursor: pointer; border-radius: 12px;
    transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1), transform 500ms cubic-bezier(0, -0.3, 0.5, 1.3);
  }
  .ll-pr-menu__item:hover { opacity: 0.84; }
  .ll-pr-menu__item:active { transform: scale(0.95); }
  .ll-pr-menu__item > img { margin-bottom: 6px; }
  .ll-pr-menu__label { line-height: 1.2; text-align: center; margin-bottom: 4px; }
  .ll-pr-menu__count { color: var(--dynamic-text-and-icons-base-secondary); }

  /* Разделитель между «меню» и инфо-блоком */
  .ll-pr-divider {
    height: 1px; background: var(--dynamic-surface-contrast-low);
    margin: 0 var(--space-3);
  }

  /* Инфо-блок: 4 строки с иконкой 16 + текстом */
  .ll-pr-info {
    display: flex; flex-direction: column; gap: var(--space-3);
    padding: var(--space-4);
  }
  .ll-pr-info__row {
    display: flex; align-items: center; gap: var(--space-3);
    color: var(--dynamic-text-and-icons-base-primary);
  }
  .ll-pr-info__row.__accent { color: var(--dynamic-text-and-icons-status-accent); }
  .ll-pr-info__icon { width: 16px; height: 16px; display: inline-block; flex-shrink: 0; }
  .ll-pr-info__row.__link { cursor: pointer; }
  .ll-pr-info__row.__link:active { opacity: 0.6; }

  /* Полоса табов «Все события / Увлечения / События Алек…» */
  /* Полоса табов лежит на «облаке» (primary), без острова */
  .ll-pr-tabs {
    --tabs-view-padding-left: var(--space-4);
    --tabs-view-padding-right: var(--space-4);
    --tabs-view-padding-top: var(--space-3);
    --tabs-view-padding-bottom: var(--space-3);
    background: transparent;
    margin-top: var(--space-2);
  }
  /* Селект-пилюля «Все события» — белая на primary-облаке */
  .ll-pr-tabs .tab-wrapper.__view-primary { background: var(--dynamic-surface-base-primary); }
  .ll-pr-tabs .tab-wrapper.__view-primary.__selected { background: var(--dynamic-surface-base-secondary); }

  /* Нижний остров с vibe-empty */
  .ll-pr-empty-island { padding: var(--space-6) var(--space-4) var(--space-8); }
</style>
</head>
<body>

  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <!-- STATUS + NAVBAR — DS meshok-up -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>

        <div class="nav-bar __type-feed">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24 nav-bar__back" aria-label="Назад"><span class="button-inline__content"><span class="icon __size-24 __slot-back"></span></span></button></span>
          </div>
          <div class="nav-bar__trailing">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24" aria-label="Ещё"><span class="button-inline__content"><img class="ll-icon button-inline__icon" src="assets/icons/more_vertical_24.svg" width="24" height="24" alt=""></span></button></span>
          </div>
        </div>
      </div>

      <!-- ПРОФИЛЬНЫЙ ОСТРОВ: имя, аватар, CTA, меню, инфо-строки -->
      <section class="island ll-pr-card-island">

        <div class="ll-pr-head">
          <div class="ll-pr-head__body">
            <div class="ds-title-l ll-pr-head__name" data-user-name>Эмиль Дружинин</div>
            <div class="ds-caption-m ll-pr-head__status">Сейчас на сайте</div>
          </div>
          <div class="avatar __size-72 __type-image">
            <img src="https://i.pravatar.cc/144?img=68" data-user-avatar alt="">
          </div>
        </div>

        <div class="ll-pr-cta">
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-primary" style="width:100%;">
              <span class="button-content">Дружить</span>
            </button>
          </div>
          <div class="button-wrapper __size-44">
            <button class="button-container __style-secondary __icon" aria-label="Подарок">
              <span class="button-content"><span class="icon __src" style="--icon-src:url('assets/icons/gift_24.svg')"></span></span>
            </button>
          </div>
          <div class="button-wrapper __size-44">
            <button class="button-container __style-secondary __icon" aria-label="Подписаться">
              <span class="button-content"><span class="icon __src" style="--icon-src:url('assets/icons/follow_24.svg')"></span></span>
            </button>
          </div>
        </div>

        <div class="ll-pr-menu">
          <button class="ll-pr-menu__item" aria-label="Друзья: 5">
            <img class="ll-icon" src="assets/icons/users_24.svg" width="24" height="24" alt="">
            <span class="ll-pr-menu__label ds-caption-m">Друзья</span>
            <span class="ll-pr-menu__count ds-caption-m">5</span>
          </button>
          <button class="ll-pr-menu__item" aria-label="Заметки: 12">
            <img class="ll-icon" src="assets/icons/edit_24.svg" width="24" height="24" alt="">
            <span class="ll-pr-menu__label ds-caption-m">Заметки</span>
            <span class="ll-pr-menu__count ds-caption-m">12</span>
          </button>
          <button class="ll-pr-menu__item" aria-label="Фото: 84">
            <img class="ll-icon" src="assets/icons/photo_24.svg" width="24" height="24" alt="">
            <span class="ll-pr-menu__label ds-caption-m">Фото</span>
            <span class="ll-pr-menu__count ds-caption-m">84</span>
          </button>
          <button class="ll-pr-menu__item" aria-label="Ещё">
            <img class="ll-icon" src="assets/icons/menu_24.svg" width="24" height="24" alt="">
            <span class="ll-pr-menu__label ds-caption-m">Ещё</span>
          </button>
        </div>

        <div class="ll-pr-divider"></div>

        <div class="ll-pr-info">
          <div class="ll-pr-info__row">
            <img class="ll-pr-info__icon" src="assets/icons/calendar_16_20.svg" width="16" height="16" alt="">
            <span class="ds-body-m">Родился 12 июня</span>
          </div>
          <div class="ll-pr-info__row">
            <img class="ll-pr-info__icon" src="assets/icons/home_16_20.svg" width="16" height="16" alt="">
            <span class="ds-body-m">Живет в Москва</span>
          </div>
          <div class="ll-pr-info__row">
            <img class="ll-pr-info__icon" src="assets/icons/follow_16_20.svg" width="16" height="16" alt="">
            <span class="ds-body-m">Подписчики: 18 человек</span>
          </div>
          <span class="button-inline-wrapper __size-20 __view-primary" style="align-self:flex-start">
            <button class="button-inline __size-20" type="button">
              <span class="button-inline__content" style="justify-content:flex-start">
                <span class="icon __size-20 __src button-inline__icon" style="--icon-src:url('../assets/icons/info_circle_16_20.svg')"></span>
                <span class="ds-body-m">Вся информация</span>
              </span>
            </button>
          </span>
        </div>

      </section>

      <!-- Полоса табов поверх secondary-полосы -->
      <div class="tabs-view ll-pr-tabs">
        <div class="tabs-row __scroll">
          <button class="tab-wrapper __view-primary __selected" role="tab" aria-selected="true">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label">Все события</span></span></span></span>
          </button>
          <button class="tab-wrapper __view-primary" role="tab" aria-selected="false">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label">Увлечения</span></span></span></span>
          </button>
          <button class="tab-wrapper __view-primary" role="tab" aria-selected="false">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label">События Александра</span></span></span></span>
          </button>
        </div>
      </div>

      <!-- Пустое состояние ленты профиля — vibe внутри острова -->
      <section class="island ll-pr-empty-island">
        <div class="vibe-wrapper">
          <div class="vibe __context-island">
            <div class="vibe__illustration" aria-hidden="true" style="font-size:80px;line-height:1">🗂️</div>
            <div class="vibe__title ds-title-l">Пока ничего нет</div>
            <div class="vibe__subtitle ds-body-l">Здесь появятся события Эмиля</div>
          </div>
        </div>
      </section>

      <div style="height: 96px"></div>

    </div>

    <!-- TABBAR (профиль открывается из «Меню», поэтому активна вкладка menu) -->
    <div class="ll-tabbar">
      <div class="tabbar __platform-android">
        <div class="tabbar__row">
          <button class="tabbar-icon __slot-feed" aria-label="Лента"></button>
          <button class="tabbar-icon __slot-book" aria-label="Книга"></button>
          <button class="tabbar-icon __slot-message" aria-label="Сообщения"></button>
          <button class="tabbar-icon __slot-discussion" aria-label="Обсуждения"></button>
          <button class="tabbar-icon __slot-clip" aria-label="Клипы"></button>
          <button class="tabbar-icon __slot-menu __state-on" aria-label="Меню"></button>
        </div>
        <div class="tabbar__handle"></div>
      </div>
    </div>
  </div>

  <script src="components/tab.js"></script>
  <script src="components/user-data.js"></script>
  <script src="components/tab-bar.js"></script>
</body>
</html>
