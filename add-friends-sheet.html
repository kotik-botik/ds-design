<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }

  .fp-scene {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    overflow: hidden;
    background: var(--dynamic-surface-base-secondary);
    touch-action: pan-y;
  }

  .ll-icon { display: inline-block; flex-shrink: 0; vertical-align: middle; }

  .fp-scene .meshok-up { position: absolute; left: 0; right: 0; top: 0; z-index: 5; }

  /* Крестик закрытия — у правого края viewport */
  .fp__close {
    position: absolute;
    top: 67px;
    right: 13px;
    width: 44px; height: 44px;
    border: 0; padding: 0; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .fp__close .icon { width: 24px; height: 24px; }

  /* Заголовок — по центру по горизонтали через 50% + translateX(-50%). */
  .fp__title {
    position: absolute;
    left: 50%;
    width: 312px;
    transform: translateX(-50%);
    text-align: center;
    font-size: 32px; line-height: 1.2;
    font-weight: 700;
    letter-spacing: 0;
    color: var(--dynamic-text-and-icons-base-primary);
    margin: 0;
    top: 96px;
    transition: opacity 280ms ease-out;
  }
  /* Положение заголовка по стейтам задаётся из JS (STATES[i].title). */

  /* Карточка — DS-компонент .friend-big-card 300×460. Позиция/размер/угол
     задаются исключительно через transform (JS-спринг). */
  .fp .friend-big-card {
    position: absolute;
    top: 0;
    left: 50%;
    margin-left: 0; /* левый край карточки прижат к центру viewport */
  }

  /* z-index в стейтах 1-2 (стак-веер): Friend 1 — самая ближняя сверху. */
  .fp .friend-big-card[data-i="1"] { z-index: 3; }
  .fp .friend-big-card[data-i="2"] { z-index: 2; }
  .fp .friend-big-card[data-i="3"] { z-index: 1; }

  /* В стейтах 3+ (карточки в ряд) z-index одинаковый. */
  .fp.__state-3 .friend-big-card,
  .fp.__state-4 .friend-big-card { z-index: 2; }

  /* ── КРУЖОЧНЫЙ ВИЗУАЛ ─────────────────────────────────────────
     До раскрытия в ряд (стейты 1-2 = стопка/веер) элементы выглядят
     как круглые аватарки: фото-квадрат скруглён в круг и центрирован
     по высоте бокса (margin-top 80 = (460-300)/2), карточная обвязка
     (фон, обводка, тень, инфо) скрыта. На переходе веер→ряд всё это
     плавно проявляется (морф задаётся transition'ами в friend-big-card.css).
     Флаг .__cards-revealed ставится по достижении ряда и фиксирует
     карточный вид — чтобы «Дружить со всеми» (возврат в веер) не
     сворачивал карточки обратно в кружки. */
  .fp:not(.__cards-revealed).__state-1 .friend-big-card,
  .fp:not(.__cards-revealed).__state-2 .friend-big-card {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .fp:not(.__cards-revealed).__state-1 .friend-big-card .friend-big-card__photo,
  .fp:not(.__cards-revealed).__state-2 .friend-big-card .friend-big-card__photo {
    margin-top: 80px;
    border-radius: 50%;
  }
  .fp:not(.__cards-revealed).__state-1 .friend-big-card .friend-big-card__info,
  .fp:not(.__cards-revealed).__state-2 .friend-big-card .friend-big-card__info {
    opacity: 0;
  }

  /* Декоративные кружки (мелкие аватарки в облаке, стейты 1-2).
     База 100×100, позиция/размер задаются transform'ом из JS (как у карточек).
     На переходе в ряд уводятся в opacity 0. */
  .fp-decor {
    position: absolute;
    top: 0;
    left: 50%;
    width: 100px; height: 100px;
    border-radius: 50%;
    overflow: hidden;
    background: #f0f0f0;
    transform-origin: 50% 50%;
    z-index: 1;
    pointer-events: none;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
    will-change: transform, opacity;
  }
  .fp-decor img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Нижний CTA */
  .fp__bottom {
    position: absolute; left: 0; right: 0; bottom: 24px;
    padding: 0 16px;
    display: flex;
    z-index: 5;
  }
  .fp__bottom .button-wrapper { width: 100%; }
  .fp__bottom .button-container { width: 100%; }

  .fp__handle {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 24px;
  }
  .fp__handle::after {
    content: '';
    position: absolute; bottom: 8px; left: 50%;
    width: 134px; height: 5px; border-radius: 3px;
    background: var(--dynamic-text-and-icons-base-primary);
    transform: translateX(-50%);
    opacity: .9;
  }

  /* Lottie-конфетти на финал «Дружить со всеми». */
  .fp-confetti {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }
  .fp-confetti svg { display: block; }

  @media (prefers-reduced-motion: reduce) {
    .fp__title { transition: none !important; }
  }
</style>

<!-- Lottie-плеер для конфетти на финал «Дружить со всеми». -->
<script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<script>
  (function () {
    var root  = document.getElementById('fp');
    var scene = document.getElementById('fpScene');
    if (!root) return;

    // ── СПРИНГ ──────────────────────────────────────────────────
    var SPRING = { k: 96, c: 6, m: 1, duration: 2000, delay: 500 };

    function makeSpring(k, c, m) {
      var w0 = Math.sqrt(k / m);
      var z  = c / (2 * Math.sqrt(k * m));
      if (Math.abs(z - 1) < 1e-6) {
        return function (tMs) {
          var t = tMs / 1000;
          return 1 - (1 + w0 * t) * Math.exp(-w0 * t);
        };
      }
      if (z < 1) {
        var wd = w0 * Math.sqrt(1 - z * z);
        return function (tMs) {
          var t = tMs / 1000;
          return 1 - Math.exp(-z * w0 * t) *
            (Math.cos(wd * t) + (z * w0 / wd) * Math.sin(wd * t));
        };
      }
      var wd2 = w0 * Math.sqrt(z * z - 1);
      return function (tMs) {
        var t = tMs / 1000;
        return 1 - Math.exp(-z * w0 * t) *
          (Math.cosh(wd2 * t) + (z * w0 / wd2) * Math.sinh(wd2 * t));
      };
    }

    // ── СТЕЙТЫ ──────────────────────────────────────────────────
    // Конверсия в transform-translate (карточка 300×460):
    //   tx = cx - 330  (= cx - 180 (центр 360-сетки) - 150 (половина CSS-карточки))
    //   ty = cy - 230  (половина высоты карточки 460)
    //   scale = unrotated_w / 300
    var STATES = [
      // Стейт 1 — КУЧКА (Figma «states» #2, x=129 — первый по канвасу): все
      // кружки сбиты в кучу у центра (~190,455), крупные ужаты. Центры — из
      // макета (360-сетка, центр=180); cy = центр круга (фото центрируется в
      // боксе через margin-top:80, см. CSS), s = ⌀/300. Заголовок — у середины.
      { title: 210, cards: {
          3: { cx: 169.45, cy: 457.55, s: 0.46317, r: 0, o: 1 },  // ⌀139
          2: { cx: 193.45, cy: 442.35, s: 0.42234, r: 0, o: 1 },  // ⌀127
          1: { cx: 210.85, cy: 466.55, s: 0.48377, r: 0, o: 1 }   // ⌀145
      }},
      // Стейт 2 — РАЗЛЁТ (Figma «states» #1, x=789): кружки разъезжаются по
      // площади, крупные вырастают. Заголовок поднимается наверх.
      { title: 96, cards: {
          3: { cx:  80.20, cy: 452.50, s: 0.51724, r: 0, o: 1 },  // Friend 3, ⌀155
          2: { cx: 289.20, cy: 315.35, s: 0.84397, r: 0, o: 1 },  // Friend 2, ⌀253 (самый крупный)
          1: { cx: 218.55, cy: 534.25, s: 0.61037, r: 0, o: 1 }   // Friend 1, ⌀183
      }},
      // Стейт 3 — в ряд, шаг 312 (300 + gap 12).
      { title: 96, cards: {
          3: { cx: 275, cy: 441, s: 1, r: 0, o: 1 },
          2: { cx: 587, cy: 441, s: 1, r: 0, o: 1 },
          1: { cx: 899, cy: 441, s: 1, r: 0, o: 1 }
      }},
      // Стейт 4 — сдвинут влево, первая карточка с гаттером 16px.
      { title: 96, cards: {
          3: { cx: 166, cy: 441, s: 1, r: 0, o: 1 },
          2: { cx: 478, cy: 441, s: 1, r: 0, o: 1 },
          1: { cx: 790, cy: 441, s: 1, r: 0, o: 1 }
      }},
      // Стейт 5 (exit) — «Дружить со всеми» внизу.
      { title: 312, cards: {
          3: { cx: 185.600, cy: 906.510, s: 0.50246, r: -6.46,  o: 0 },
          2: { cx: 185.503, cy: 920.341, s: 0.50246, r:  0.50,  o: 0 },
          1: { cx: 179.842, cy: 938.120, s: 0.50246, r:  9.78,  o: 0 }
      }}
    ];
    // data-i отражает порядок «спереди-назад» в стопочно-веерных стейтах
    // (i=1 — самая ближняя/верхняя, i=3 — самая дальняя/нижняя), поэтому
    // нумерация инвертирована относительно визуального ряда в стейте 4:
    //   data-i=3 → Ольга      (leftmost в ряду, back в стопке)
    //   data-i=2 → Александр  (middle)
    //   data-i=1 → Михаил     (rightmost в ряду, front в стопке)
    var IDX = [3, 2, 1];

    var els = {};
    IDX.forEach(function (i) {
      els[i] = root.querySelector('.friend-big-card[data-i="' + i + '"]');
    });
    var titleEl = root.querySelector('.fp__title');

    // ── ДЕКОРАТИВНЫЕ КРУЖКИ ─────────────────────────────────────
    // 4 мелких аватарки облака (Figma «states» #1/#2). Позиции по стейтам:
    // [0]=кучка, [1]=разлёт, [2..4]=разлёт, но o:0 (тают при переходе в ряд).
    // {cx,cy} — центр круга (360-сетка, центр=180; cy от верха), d — ⌀(px).
    var CLUSTER = { A: {cx:191.25,cy:468.25,d:90.5}, B: {cx:191.20,cy:464.20,d:80.4},
                    C: {cx:213.90,cy:448.90,d:73.8}, D: {cx:191.00,cy:449.00,d:38} };
    function decorStates(scatter) {
      var c = CLUSTER[scatter.k];
      var sc = { cx: scatter.cx, cy: scatter.cy, d: scatter.d };
      return [
        { cx: c.cx,  cy: c.cy,  d: c.d,  o: 1 },   // стейт 1 — кучка
        { cx: sc.cx, cy: sc.cy, d: sc.d, o: 1 },   // стейт 2 — разлёт
        { cx: sc.cx, cy: sc.cy, d: sc.d, o: 0 },   // стейт 3 — тают на месте
        { cx: sc.cx, cy: sc.cy, d: sc.d, o: 0 },
        { cx: sc.cx, cy: sc.cy, d: sc.d, o: 0 }
      ];
    }
    var DECOR = [
      { k: 'A', cx:  77.65, cy: 320.75, d: 90.5 },
      { k: 'B', cx:  82.20, cy: 543.90, d: 80.4 },
      { k: 'C', cx: 335.90, cy: 434.90, d: 73.8 },
      { k: 'D', cx: 117.00, cy: 589.00, d: 38   }
    ].map(function (s) {
      return { el: root.querySelector('.fp-decor[data-decor="' + s.k + '"]'),
               states: decorStates(s) };
    });

    function applyDecor(el, s) {
      if (!el) return;
      el.style.transform =
        'translate(' + (s.cx - 230).toFixed(2) + 'px, ' + (s.cy - 50).toFixed(2) + 'px) ' +
        'scale(' + (s.d / 100).toFixed(5) + ')';
      el.style.opacity = (s.o !== undefined ? s.o : 1).toFixed(3);
    }

    // Применить состояние одной карточки. dxPan — горизонтальный сдвиг (от свайпа).
    function applyCard(el, s, dxPan) {
      var tx = (s.cx - 330) + (dxPan || 0);
      var ty = s.cy - 230;
      el.style.transform =
        'translate(' + tx.toFixed(3) + 'px, ' + ty.toFixed(3) + 'px) ' +
        'scale(' + s.s.toFixed(5) + ') ' +
        'rotate(' + s.r.toFixed(3) + 'deg)';
      el.style.setProperty('--friend-big-card-scale', s.s.toFixed(5));
      if (s.o !== undefined) el.style.opacity = s.o.toFixed(3);
    }

    var current = 0;
    var animating = false;
    var panOffset = 0;

    function applyState(idx) {
      var st = STATES[idx];
      IDX.forEach(function (i) { applyCard(els[i], st.cards[i], 0); });
      DECOR.forEach(function (d) { applyDecor(d.el, d.states[idx]); });
      titleEl.style.top = st.title + 'px';
    }
    applyState(0);
    root.classList.add('__state-1');

    // Предзагружаем lottie-конфетти. Запустим после exit-цепочки.
    var confettiHost = document.getElementById('fpConfetti');
    var confettiData = null;
    fetch('assets/lottie/confetti.json')
      .then(function (r) { return r.json(); })
      .then(function (d) { confettiData = d; })
      .catch(function () { /* offline / file missing — silently skip */ });
    function fireConfetti() {
      if (!confettiData || !window.lottie || !confettiHost) return;
      var anim = window.lottie.loadAnimation({
        container: confettiHost,
        renderer: 'svg', loop: false, autoplay: true,
        rendererSettings: { preserveAspectRatio: 'xMidYMid slice' },
        animationData: JSON.parse(JSON.stringify(confettiData))
      });
      anim.addEventListener('complete', function () {
        anim.destroy();
        confettiHost.innerHTML = '';
      });
    }
    // Финальный экран: меняем заголовок + конфетти.
    function showAllAccepted() {
      titleEl.innerHTML = 'Вы подружились<br>со всеми';
      fireConfetti();
    }

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    // CSS cubic-bezier(x1, y1, x2, y2) реализация: по x находим u через
    // Ньютона, потом считаем y(u).
    function makeBezier(x1, y1, x2, y2) {
      return function (t) {
        var u = t;
        for (var i = 0; i < 8; i++) {
          var omu = 1 - u;
          var x  = 3 * omu * omu * u * x1 + 3 * omu * u * u * x2 + u * u * u;
          var dx = 3 * omu * omu * x1 + 6 * omu * u * (x2 - x1) + 3 * u * u * (1 - x2);
          if (Math.abs(dx) < 1e-6) break;
          u -= (x - t) / dx;
          if (u < 0) u = 0; else if (u > 1) u = 1;
        }
        var omu2 = 1 - u;
        return 3 * omu2 * omu2 * u * y1 + 3 * omu2 * u * u * y2 + u * u * u;
      };
    }
    function reducedMotion() {
      try { return matchMedia('(prefers-reduced-motion: reduce)').matches; }
      catch (_) { return false; }
    }

    function transitionTo(toIdx, opts) {
      opts = opts || { mode: 'spring' };
      if (animating || toIdx === current) return;
      animating = true;
      var prevIdx = current;
      var from    = STATES[prevIdx];
      var to      = STATES[toIdx];
      current = toIdx;
      root.classList.remove('__state-1', '__state-2', '__state-3', '__state-4', '__state-5');
      root.classList.add('__state-' + (toIdx + 1));
      // Достигли ряда (стейт 3 = idx 2) — фиксируем карточный вид навсегда:
      // дальнейший возврат в веер (Дружить со всеми) не сворачивает в кружки.
      if (toIdx >= 2) root.classList.add('__cards-revealed');

      function done() {
        applyState(toIdx);
        animating = false;
        if (toIdx === 3) attachSwipe();
        if (opts.onDone) opts.onDone();
      }

      if (reducedMotion()) { done(); return; }

      var dur, progress;
      if (opts.mode === 'spring') {
        dur = opts.duration || SPRING.duration;
        progress = makeSpring(opts.k || SPRING.k, opts.c || SPRING.c, opts.m || SPRING.m);
      } else if (opts.mode === 'bezier') {
        dur = opts.duration || 300;
        var bz = opts.bezier;
        var ease = makeBezier(bz[0], bz[1], bz[2], bz[3]);
        progress = function (tMs) { return ease(Math.min(1, tMs / dur)); };
      } else {
        dur = opts.duration || 300;
        progress = function (tMs) { return easeOutCubic(Math.min(1, tMs / dur)); };
      }

      var t0 = performance.now();
      (function frame(now) {
        var elapsed = Math.min(dur, now - t0);
        var p = progress(elapsed);
        IDX.forEach(function (i) {
          var fc = from.cards[i], tc = to.cards[i];
          var fo = fc.o !== undefined ? fc.o : 1;
          var to_ = tc.o !== undefined ? tc.o : 1;
          applyCard(els[i], {
            cx: fc.cx + (tc.cx - fc.cx) * p,
            cy: fc.cy + (tc.cy - fc.cy) * p,
            s:  fc.s  + (tc.s  - fc.s)  * p,
            r:  fc.r  + (tc.r  - fc.r)  * p,
            o:  fo    + (to_   - fo)    * p
          }, 0);
        });
        DECOR.forEach(function (d) {
          var fs = d.states[prevIdx], ts = d.states[toIdx];
          var fo = fs.o !== undefined ? fs.o : 1;
          var to2 = ts.o !== undefined ? ts.o : 1;
          applyDecor(d.el, {
            cx: fs.cx + (ts.cx - fs.cx) * p,
            cy: fs.cy + (ts.cy - fs.cy) * p,
            d:  fs.d  + (ts.d  - fs.d)  * p,
            o:  fo    + (to2   - fo)    * p
          });
        });
        titleEl.style.top =
          (from.title + (to.title - from.title) * p).toFixed(3) + 'px';
        if (elapsed < dur) requestAnimationFrame(frame);
        else done();
      })(performance.now());
    }

    // ── СВАЙП КАРУСЕЛИ ──────────────────────────────────────────
    function attachSwipe() {
      if (scene.dataset.swipeAttached) return;
      scene.dataset.swipeAttached = '1';

      var rowState = STATES[3].cards;
      var STEP = rowState[2].cx - rowState[3].cx;
      var firstCx = rowState[3].cx;
      var liveCards = IDX.slice();                   // [3, 2, 1]
      var minSnap = -(liveCards.length - 1);
      var processing = {};

      var startX = 0, startY = 0;
      var dragging = false;
      var locked = false;
      var pointerId = null;
      var snapRaf = null;
      var GUTTER = 5;
      var snapped = 0;

      function symmetricRound(x) {
        return x < 0 ? -Math.round(-x) : Math.round(x);
      }

      function onDown(e) {
        if (animating) return;
        if (dragging) return;
        if (e.target && e.target.closest && e.target.closest('button')) return;

        startX = e.clientX;
        startY = e.clientY;
        dragging = true;
        locked = false;
        pointerId = e.pointerId;
        try { scene.setPointerCapture(pointerId); } catch (_) {}
      }
      function releaseCapture() {
        if (pointerId !== null) {
          try { scene.releasePointerCapture(pointerId); } catch (_) {}
          pointerId = null;
        }
      }
      function endDrag() {
        dragging = false;
        locked = false;
        releaseCapture();
      }
      function onMove(e) {
        if (!dragging) return;
        if (e.pointerId !== pointerId) return;
        var dx = e.clientX - startX;
        var dy = e.clientY - startY;
        if (!locked) {
          if (Math.abs(dx) < GUTTER && Math.abs(dy) < GUTTER) return;
          if (Math.abs(dy) > Math.abs(dx)) { endDrag(); return; }
          if (e.cancelable) e.preventDefault();
          locked = true;
          if (snapRaf) {
            cancelAnimationFrame(snapRaf);
            snapRaf = null;
            startX = e.clientX - (panOffset - snapped * STEP);
            dx = e.clientX - startX;
          }
        } else if (e.cancelable) {
          e.preventDefault();
        }
        var pan = snapped * STEP + dx;
        if (pan > 0 && snapped === 0) pan = pan * 0.3;
        var minPan = minSnap * STEP;
        if (pan < minPan) pan = minPan + (pan - minPan) * 0.3;
        panOffset = pan;
        IDX.forEach(function (i) { applyCard(els[i], rowState[i], pan); });
      }
      function onUp(e) {
        if (e && pointerId !== null && e.pointerId !== pointerId) return;
        var wasLocked = locked;
        endDrag();
        if (!wasLocked) return;
        var raw = panOffset / STEP;
        var target = symmetricRound(raw);
        if (target > 0) target = 0;
        if (target < minSnap) target = minSnap;
        snapped = target;
        animateSnap(target * STEP);
      }
      function onCancel(e) {
        if (e && pointerId !== null && e.pointerId !== pointerId) return;
        var wasLocked = locked;
        endDrag();
        if (!wasLocked) return;
        animateSnap(snapped * STEP);
      }
      function animateSnap(targetPan) {
        if (snapRaf) { cancelAnimationFrame(snapRaf); snapRaf = null; }
        var fromPan = panOffset;
        var t0 = performance.now();
        var dur = 280;
        function frame(now) {
          var p = Math.min(1, (now - t0) / dur);
          var eased = 1 - Math.pow(1 - p, 3);
          var pan = fromPan + (targetPan - fromPan) * eased;
          panOffset = pan;
          IDX.forEach(function (i) { applyCard(els[i], rowState[i], pan); });
          if (p < 1) snapRaf = requestAnimationFrame(frame);
          else snapRaf = null;
        }
        snapRaf = requestAnimationFrame(frame);
      }

      // ── ACCEPT («Дружить» на карточке) ─────────────────────
      // Тап «Дружить» → улёт вверх → ряд сдвигается влево.
      // Без orange-fill/checkmark (это специфика gifts).
      function processCard(i) {
        if (processing[i]) return;
        processing[i] = true;
        var el = els[i];
        var FLY_DUR  = 600;
        var SHIFT_DUR = 350;

        function flyOut() {
          el.classList.add('__flying-up');
          var cs = rowState[i];
          var tx = (cs.cx - 330) + panOffset;
          var ty = (cs.cy - 230) - 800;
          var rot = 22;
          requestAnimationFrame(function () {
            el.style.transform =
              'translate(' + tx.toFixed(2) + 'px, ' + ty.toFixed(2) + 'px) ' +
              'scale(1) rotate(' + rot + 'deg)';
          });
          setTimeout(removeFromRow, FLY_DUR);
        }
        function removeFromRow() {
          el.style.display = 'none';
          var idx = liveCards.indexOf(i);
          if (idx >= 0) liveCards.splice(idx, 1);
          for (var k = 0; k < liveCards.length; k++) {
            rowState[liveCards[k]].cx = firstCx + k * STEP;
          }
          minSnap = -(liveCards.length - 1);
          if (snapped < minSnap) snapped = minSnap;
          liveCards.forEach(function (j) {
            els[j].style.transition = 'transform ' + SHIFT_DUR + 'ms ease-out';
          });
          var newPan = snapped * STEP;
          requestAnimationFrame(function () {
            panOffset = newPan;
            liveCards.forEach(function (j) {
              applyCard(els[j], rowState[j], newPan);
            });
          });
          setTimeout(function () {
            liveCards.forEach(function (j) {
              els[j].style.transition = '';
            });
          }, SHIFT_DUR + 30);
          if (liveCards.length === 0) {
            setTimeout(showAllAccepted, SHIFT_DUR);
          }
        }

        flyOut();
      }

      IDX.forEach(function (i) {
        var el = els[i];
        var accBtn = el.querySelector('.friend-big-card__accept .button-container');
        if (accBtn) accBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          processCard(i);
        });
      });

      scene.addEventListener('pointerdown', onDown);
      scene.addEventListener('pointermove', onMove);
      scene.addEventListener('pointerup', onUp);
      scene.addEventListener('pointercancel', onCancel);

      // ── «Дружить со всеми» (нижний CTA) ────────────────────────
      // Возвращаем карточки в стейт 2 (веер), потом ужимаем до стейта 1
      // и уводим вниз за viewport с opacity 0 (STATES[4]).
      var acceptAllBtn = document.getElementById('fpAcceptAll');
      if (acceptAllBtn && !acceptAllBtn.dataset.wired) {
        acceptAllBtn.dataset.wired = '1';
        acceptAllBtn.addEventListener('click', function () {
          if (animating) return;
          if (!liveCards.length) return;
          if (snapRaf) { cancelAnimationFrame(snapRaf); snapRaf = null; }
          if (panOffset !== 0) {
            liveCards.forEach(function (j) {
              STATES[3].cards[j].cx += panOffset;
            });
            panOffset = 0;
            snapped = 0;
          }
          // Шаг 1 — обратно в веер (state 2), overdamped spring 600мс.
          // Шаг 2 — «падают и исчезают» (state 5 = exit), bezier 500мс.
          transitionTo(1, {
            mode: 'spring', k: 80, c: 20, m: 1, duration: 600,
            onDone: function () {
              setTimeout(function () {
                transitionTo(4, {
                  mode: 'bezier', bezier: [0, 0, 1, -0.01], duration: 500,
                  onDone: showAllAccepted
                });
              }, 1);
            }
          });
        });
      }
    }

    // ── СЦЕНАРИЙ ────────────────────────────────────────────────
    //   1 → 2 (спринг 2000мс, k=96 c=6 m=1) — после старта SPRING.delay
    //   2 → 3 (ease-out 300мс)              — пауза PAUSE_BETWEEN после 1→2
    //   3 → 4 (overdamped спринг 600мс)     — Figma: delay 1мс после 2→3
    var PAUSE_BETWEEN = 800;
    var EASE_DUR = 300;

    if (reducedMotion()) {
      current = 3;
      root.classList.remove('__state-1');
      root.classList.add('__state-4', '__cards-revealed');
      applyState(3);
      attachSwipe();
    } else {
      setTimeout(function () {
        transitionTo(1, {
          mode: 'spring',
          onDone: function () {
            setTimeout(function () {
              transitionTo(2, {
                mode: 'css', duration: EASE_DUR, easing: 'ease-out',
                onDone: function () {
                  transitionTo(3, { mode: 'spring', k: 80, c: 20, m: 1, duration: 600 });
                }
              });
            }, PAUSE_BETWEEN);
          }
        });
      }, 1000);  // дать облаку кружков (стейт 1) прочитаться перед слётом в центр
    }
  })();
</script>

</body>
</html>
