<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Подарки — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: pagereveal — направление перехода (вперёд/назад). -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }

  /* Сцена 360×800 — координаты карточек/заголовка взяты прямо из Figma.
     На широких экранах сцена центрируется. */
  .gp-scene {
    position: relative;
    width: 360px;
    height: 100dvh;
    min-height: 100dvh;
    margin: 0 auto;
    overflow: hidden;
    background: var(--dynamic-surface-base-secondary);
  }

  .ll-icon { display: inline-block; flex-shrink: 0; vertical-align: middle; }

  /* Status bar — DS-компонент в обычном меше */
  .gp-scene .meshok-up { position: absolute; left: 0; right: 0; top: 0; z-index: 5; }

  /* Крестик закрытия — отдельный icon в правом верхнем углу.
     Координаты по Figma: x=315, y=79, size 24. Кликабельная область 44×44. */
  .gp__close {
    position: absolute;
    top: 67px;            /* (79 - 12) — центрируем 44×44 цели вокруг 24×24 иконки */
    left: 303px;          /* (315 - 12) */
    width: 44px; height: 44px;
    border: 0; padding: 0; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .gp__close .icon { width: 24px; height: 24px; }

  /* Заголовок — абсолют. left=24, width=312 (Figma). top анимируется. */
  .gp__title {
    position: absolute;
    left: 24px; width: 312px;
    text-align: center;
    font-size: 32px; line-height: 1.2;
    font-weight: 700;
    letter-spacing: 0;
    color: var(--dynamic-text-and-icons-base-primary);
    margin: 0;
    /* Стейт 1 — title чуть выше центра, под крестиком */
    top: 249px;
    transition: top 1500ms linear, opacity 280ms ease-out;
  }
  .gp.__state-2 .gp__title { top: 130px; }

  /* Карточка-подарок — позиция/размер берутся из Figma, анимируются линейно. */
  .gp-card {
    position: absolute;
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    border: 0.744px solid rgba(0,0,0,0.1);
    box-shadow: 0 22.332px 22.332px rgba(0,0,0,0.07);
    transform-origin: 50% 50%;
    transition:
      left   1500ms linear,
      top    1500ms linear,
      width  1500ms linear,
      height 1500ms linear,
      transform 1500ms linear,
      opacity 1500ms linear;
  }

  /* z-index: Gift 1 — самая ближняя, Gift 3 — самая дальняя */
  .gp-card[data-i="1"] { z-index: 3; }
  .gp-card[data-i="2"] { z-index: 2; }
  .gp-card[data-i="3"] { z-index: 1; }

  /* СТЕЙТ 1 — закрытый стак. Размер карточки 150.737×183.298, координаты
     по top-left анротированной карточки (учитывается оффсет от bbox-обёртки). */
  .gp-card[data-i="3"] { left: 110.23px; top: 434.90px; width: 150.737px; height: 183.298px; transform: rotate(-6.46deg); }
  .gp-card[data-i="2"] { left: 110.13px; top: 448.69px; width: 150.737px; height: 183.298px; transform: rotate(0.5deg);  }
  .gp-card[data-i="1"] { left: 104.47px; top: 466.47px; width: 150.737px; height: 183.298px; transform: rotate(9.78deg); }

  /* СТЕЙТ 2 — раскрытый веер. Размер карточки 223.319×260.539. */
  .gp.__state-2 .gp-card[data-i="3"] { left: 42.36px;  top: 246.98px; width: 223.319px; height: 260.539px; transform: rotate(-7.21deg);  }
  .gp.__state-2 .gp-card[data-i="2"] { left: 126.21px; top: 349.48px; width: 223.319px; height: 260.539px; transform: rotate(15deg);    }
  .gp.__state-2 .gp-card[data-i="1"] { left: 23.46px;  top: 429.91px; width: 223.319px; height: 260.539px; transform: rotate(-16.48deg);}

  /* Внутренности карточки — uniCell (avatar + имя) + постер */
  .gp-card__head {
    position: absolute; top: 10px; left: 10px; right: 36px;
    display: flex; align-items: center; gap: 6px;
    z-index: 2;
  }
  .gp-card__head .avatar { width: 20px; height: 20px; border-radius: 50%; overflow: hidden; flex: 0 0 auto; background: #eee; }
  .gp-card__head .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gp-card__head .name {
    font-size: 11px; line-height: 14px; font-weight: 600;
    color: rgba(0,0,0,.72);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .gp-card__poster {
    position: absolute; left: 0; right: 0; top: 36px; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 12px;
    color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .gp-card[data-i="3"] .gp-card__poster { background: linear-gradient(140deg, #ff6fa3 0%, #c2185b 100%); }
  .gp-card[data-i="2"] .gp-card__poster {
    background: linear-gradient(140deg, #fff1d6 0%, #ffb7a3 60%, #ff8a65 100%);
    color: #6a3b1c; text-shadow: 0 1px 0 rgba(255,255,255,.4);
  }
  .gp-card[data-i="1"] .gp-card__poster { background: linear-gradient(140deg, #a07a55 0%, #5e4226 100%); }
  .gp-card__poster .emoji {
    font-size: 48px; line-height: 1; margin-bottom: 4px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.2));
  }
  .gp-card__poster .text {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; font-weight: 700;
    font-size: 18px; line-height: 22px; letter-spacing: -0.01em;
  }

  /* Нижний CTA */
  .gp__bottom {
    position: absolute; left: 0; right: 0; bottom: 24px;
    padding: 0 16px;
    display: flex;
    z-index: 5;
  }
  .gp__bottom .button-wrapper { width: 100%; }
  .gp__bottom .button-container { width: 100%; }

  /* Home-indicator */
  .gp__handle {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 24px;
  }
  .gp__handle::after {
    content: '';
    position: absolute; bottom: 8px; left: 50%;
    width: 134px; height: 5px; border-radius: 3px;
    background: var(--dynamic-text-and-icons-base-primary);
    transform: translateX(-50%);
    opacity: .9;
  }

  @media (prefers-reduced-motion: reduce) {
    .gp__title, .gp-card { transition: none !important; }
  }
</style>
</head>
<body>

<div class="gp-scene">

  <!-- Статус-бар -->
  <div class="meshok-up">
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <span class="status-bar__indicators">
        <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
      </span>
    </div>
  </div>

  <!-- Крестик закрытия — поверх контента -->
  <button class="gp__close nav-bar__back" aria-label="Закрыть">
    <span class="icon __slot-close"></span>
  </button>

  <!-- Тело экрана: заголовок + 3 карточки -->
  <main class="gp" id="gp">
    <h1 class="gp__title">Вам подарили<br>3 подарка!</h1>

    <article class="gp-card" data-i="3">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=23" alt=""></span>
        <span class="name">Виктория Петрова</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">💐</div>
        <div class="text">Спасибо<br>за дружбу</div>
      </div>
    </article>

    <article class="gp-card" data-i="2">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=47" alt=""></span>
        <span class="name">Мария Иванова</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">🌷</div>
        <div class="text">Любимой</div>
      </div>
    </article>

    <article class="gp-card" data-i="1">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=12" alt=""></span>
        <span class="name">Дмитрий Кузнецов</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">🐱</div>
        <div class="text">Шашлычков<br>очень хочется!</div>
      </div>
    </article>
  </main>

  <!-- Нижний CTA -->
  <div class="gp__bottom">
    <div class="button-wrapper __size-56">
      <button class="button-container __style-primary" id="gpAcceptAll">
        <span class="button-content">Принять все</span>
      </button>
    </div>
  </div>

  <div class="gp__handle"></div>

</div>

<script src="components/back-button.js"></script>
<script>
  // Простой переключатель state-1 → state-2 после короткой паузы.
  // CSS-transitions с linear 1500ms тянут left/top/width/height/transform.
  (function () {
    var root = document.getElementById('gp');
    if (!root) return;
    var DELAY = 500;     // пауза перед запуском
    setTimeout(function () {
      root.classList.add('__state-2');
    }, DELAY);
  })();
</script>

</body>
</html>
