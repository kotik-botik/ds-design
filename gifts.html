<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Подарки — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: pagereveal — направление перехода (вперёд/назад). -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }

  /* Сцена — флекс-колонка во всю ширину, как другие прототипы.
     Карточки внутри центрируются по горизонтали относительно середины
     viewport (см. .gp-card { left: 50%; translateX } и JS). */
  .gp-scene {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    overflow: hidden;
    background: var(--dynamic-surface-base-secondary);
  }

  .ll-icon { display: inline-block; flex-shrink: 0; vertical-align: middle; }

  /* Status bar — DS-компонент в обычном меше */
  .gp-scene .meshok-up { position: absolute; left: 0; right: 0; top: 0; z-index: 5; }

  /* Крестик закрытия — в правом верхнем углу, привязан к правому краю
     viewport (а не к 360-сетке). По Figma расстояние до правого края 13px. */
  .gp__close {
    position: absolute;
    top: 67px;
    right: 13px;
    width: 44px; height: 44px;
    border: 0; padding: 0; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .gp__close .icon { width: 24px; height: 24px; }

  /* Заголовок — абсолют, по центру через 50%+translateX. width=312 (Figma).
     top анимируется JS-спрингом, CSS-transition только для opacity. */
  .gp__title {
    position: absolute;
    left: 50%;
    width: 312px;
    transform: translateX(-50%);
    text-align: center;
    font-size: 32px; line-height: 1.2;
    font-weight: 700;
    letter-spacing: 0;
    color: var(--dynamic-text-and-icons-base-primary);
    margin: 0;
    top: 249px;
    transition: opacity 280ms ease-out;
  }
  .gp.__state-2 .gp__title,
  .gp.__state-3 .gp__title { top: 130px; }

  /* Карточка-подарок — left/top/width/height/transform тянутся JS-спрингом.
     Базовая позиция (left: 50%) задаёт точку отсчёта по центру viewport;
     JS дополняет inline-стилем точный сдвиг и размер. */
  .gp-card {
    position: absolute;
    left: 50%;
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    border: 0.744px solid rgba(0,0,0,0.1);
    box-shadow: 0 22.332px 22.332px rgba(0,0,0,0.07);
    transform-origin: 50% 50%;
    cursor: pointer;
  }

  /* z-index: Gift 1 — самая ближняя, Gift 3 — самая дальняя */
  .gp-card[data-i="1"] { z-index: 3; }
  .gp-card[data-i="2"] { z-index: 2; }
  .gp-card[data-i="3"] { z-index: 1; }

  /* Внутренности карточки — uniCell (avatar + имя) + постер */
  .gp-card__head {
    position: absolute; top: 10px; left: 10px; right: 36px;
    display: flex; align-items: center; gap: 6px;
    z-index: 2;
  }
  .gp-card__head .avatar { width: 20px; height: 20px; border-radius: 50%; overflow: hidden; flex: 0 0 auto; background: #eee; }
  .gp-card__head .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gp-card__head .name {
    font-size: 11px; line-height: 14px; font-weight: 600;
    color: rgba(0,0,0,.72);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .gp-card__poster {
    position: absolute; left: 0; right: 0; top: 36px; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 12px;
    color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .gp-card[data-i="3"] .gp-card__poster { background: linear-gradient(140deg, #ff6fa3 0%, #c2185b 100%); }
  .gp-card[data-i="2"] .gp-card__poster {
    background: linear-gradient(140deg, #fff1d6 0%, #ffb7a3 60%, #ff8a65 100%);
    color: #6a3b1c; text-shadow: 0 1px 0 rgba(255,255,255,.4);
  }
  .gp-card[data-i="1"] .gp-card__poster { background: linear-gradient(140deg, #a07a55 0%, #5e4226 100%); }
  .gp-card__poster .emoji {
    font-size: 48px; line-height: 1; margin-bottom: 4px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.2));
  }
  .gp-card__poster .text {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; font-weight: 700;
    font-size: 18px; line-height: 22px; letter-spacing: -0.01em;
  }

  /* Нижний CTA */
  .gp__bottom {
    position: absolute; left: 0; right: 0; bottom: 24px;
    padding: 0 16px;
    display: flex;
    z-index: 5;
  }
  .gp__bottom .button-wrapper { width: 100%; }
  .gp__bottom .button-container { width: 100%; }

  /* Home-indicator */
  .gp__handle {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 24px;
  }
  .gp__handle::after {
    content: '';
    position: absolute; bottom: 8px; left: 50%;
    width: 134px; height: 5px; border-radius: 3px;
    background: var(--dynamic-text-and-icons-base-primary);
    transform: translateX(-50%);
    opacity: .9;
  }

  @media (prefers-reduced-motion: reduce) {
    .gp__title, .gp-card { transition: none !important; }
  }
</style>
</head>
<body>

<div class="gp-scene">

  <!-- Статус-бар -->
  <div class="meshok-up">
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <span class="status-bar__indicators">
        <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
      </span>
    </div>
  </div>

  <!-- Крестик закрытия — поверх контента -->
  <button class="gp__close nav-bar__back" aria-label="Закрыть">
    <span class="icon __slot-close"></span>
  </button>

  <!-- Тело экрана: заголовок + 3 карточки -->
  <main class="gp" id="gp">
    <h1 class="gp__title">Вам подарили<br>3 подарка!</h1>

    <article class="gp-card" data-i="3">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=23" alt=""></span>
        <span class="name">Виктория Петрова</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">💐</div>
        <div class="text">Спасибо<br>за дружбу</div>
      </div>
    </article>

    <article class="gp-card" data-i="2">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=47" alt=""></span>
        <span class="name">Мария Иванова</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">🌷</div>
        <div class="text">Любимой</div>
      </div>
    </article>

    <article class="gp-card" data-i="1">
      <div class="gp-card__head">
        <span class="avatar"><img src="https://i.pravatar.cc/40?img=12" alt=""></span>
        <span class="name">Дмитрий Кузнецов</span>
      </div>
      <div class="gp-card__poster">
        <div class="emoji">🐱</div>
        <div class="text">Шашлычков<br>очень хочется!</div>
      </div>
    </article>
  </main>

  <!-- Нижний CTA -->
  <div class="gp__bottom">
    <div class="button-wrapper __size-56">
      <button class="button-container __style-primary" id="gpAcceptAll">
        <span class="button-content">Принять все</span>
      </button>
    </div>
  </div>

  <div class="gp__handle"></div>

</div>

<script src="components/back-button.js"></script>
<script>
  // Спринг (k=96, c=6, m=1, ζ≈0.306 — недодемпфированный с лёгким перехлёстом).
  // Прогоняет left/top/width/height/rotation у трёх карточек и top у заголовка
  // в одной rAF-петле. Все 5 величин на каждом объекте бегут одной spring-кривой.
  (function () {
    var root = document.getElementById('gp');
    if (!root) return;

    // Дефолтный спринг для первого перехода (стейт 1 → 2).
    var SPRING = { k: 96, c: 6, m: 1, duration: 2000, delay: 500 };

    // Фабрика progress-функции под произвольные spring-параметры.
    // Корректно покрывает все три режима по ζ = c/(2√(km)):
    //   ζ < 1 — underdamped (с перехлёстом), cos/sin
    //   ζ = 1 — critically damped
    //   ζ > 1 — overdamped, cosh/sinh
    function makeSpring(k, c, m) {
      var w0 = Math.sqrt(k / m);
      var z  = c / (2 * Math.sqrt(k * m));
      if (Math.abs(z - 1) < 1e-6) {
        return function (tMs) {
          var t = tMs / 1000;
          return 1 - (1 + w0 * t) * Math.exp(-w0 * t);
        };
      }
      if (z < 1) {
        var wd = w0 * Math.sqrt(1 - z * z);
        return function (tMs) {
          var t = tMs / 1000;
          return 1 - Math.exp(-z * w0 * t) *
            (Math.cos(wd * t) + (z * w0 / wd) * Math.sin(wd * t));
        };
      }
      // overdamped (z > 1)
      var wd2 = w0 * Math.sqrt(z * z - 1);
      return function (tMs) {
        var t = tMs / 1000;
        return 1 - Math.exp(-z * w0 * t) *
          (Math.cosh(wd2 * t) + (z * w0 / wd2) * Math.sinh(wd2 * t));
      };
    }

    // Три стейта, каждый описывает где лежат карточки (по data-i) и top
    // заголовка. Координаты — из Figma get_design_context.
    //   0 — стейт 1 (закрытый стак)
    //   1 — стейт 2 (раскрытый веер)
    //   2 — стейт 3 (карточки в ряд, как в свайп-карусели)
    var STATES = [
      { title: 249, cards: {
          3: { l: 110.23, t: 434.90, w: 150.737, h: 183.298, r: -6.46  },
          2: { l: 110.13, t: 448.69, w: 150.737, h: 183.298, r:  0.5   },
          1: { l: 104.47, t: 466.47, w: 150.737, h: 183.298, r:  9.78  }
      }},
      { title: 130, cards: {
          3: { l: 42.36,  t: 246.98, w: 223.319, h: 260.539, r: -7.21  },
          2: { l: 126.21, t: 349.48, w: 223.319, h: 260.539, r:  15    },
          1: { l: 23.46,  t: 429.91, w: 223.319, h: 260.539, r: -16.48 }
      }},
      // Стейт 3 — карточки в ряд. Виктория (i=3) на позиции из Figma (l=125),
      // gap между карточками 12px (300+12=312 шаг).
      { title: 130, cards: {
          3: { l: 125, t: 266, w: 300, h: 350, r: 0 },
          2: { l: 437, t: 266, w: 300, h: 350, r: 0 },
          1: { l: 749, t: 266, w: 300, h: 350, r: 0 }
      }},
      // Стейт 4 — весь стак сдвигается влево на 95px (равномерно).
      // Виктория (i=3) встаёт ровно по центру (l = (360-300)/2 = 30).
      // Gap=12px сохраняется, остальные карточки следуют справа-налево.
      { title: 130, cards: {
          3: { l:  30, t: 266, w: 300, h: 350, r: 0 },
          2: { l: 342, t: 266, w: 300, h: 350, r: 0 },
          1: { l: 654, t: 266, w: 300, h: 350, r: 0 }
      }}
    ];

    var IDX = [3, 2, 1];
    var els = {};
    IDX.forEach(function (i) {
      els[i] = root.querySelector('.gp-card[data-i="' + i + '"]');
    });
    var titleEl = root.querySelector('.gp__title');

    // s.l — это left в 360-сетке Figma. Сдвиг -180 переводит его в
     // координаты относительно центра viewport (CSS даёт left: 50%).
    function applyCard(el, s) {
      el.style.top    = s.t.toFixed(3) + 'px';
      el.style.width  = s.w.toFixed(3) + 'px';
      el.style.height = s.h.toFixed(3) + 'px';
      el.style.transform =
        'translateX(' + (s.l - 180).toFixed(3) + 'px) rotate(' + s.r.toFixed(3) + 'deg)';
    }

    // Начинаем в стейте 0 (state 1) — выставляем inline-стилем сразу.
    var current = 0;
    var animating = false;

    function applyState(idx) {
      var s = STATES[idx];
      IDX.forEach(function (i) { applyCard(els[i], s.cards[i]); });
      titleEl.style.top = s.title + 'px';
    }
    applyState(0);

    function transitionTo(toIdx, opts) {
      opts = opts || { mode: 'spring' };
      if (animating || toIdx === current) return;
      animating = true;
      var from = STATES[current];
      var to   = STATES[toIdx];
      root.classList.remove('__state-1', '__state-2', '__state-3');
      root.classList.add('__state-' + (toIdx + 1));

      if (opts.mode === 'spring') {
        // JS-rAF спринг по всем 5 величинам карточек + top заголовка.
        var k   = opts.k        || SPRING.k;
        var c   = opts.c        || SPRING.c;
        var m   = opts.m        || SPRING.m;
        var dur = opts.duration || SPRING.duration;
        var progress = makeSpring(k, c, m);
        var t0 = performance.now();
        (function frame(now) {
          var elapsed = Math.min(dur, now - t0);
          var p = progress(elapsed);
          IDX.forEach(function (i) {
            var fc = from.cards[i], tc = to.cards[i];
            applyCard(els[i], {
              l: fc.l + (tc.l - fc.l) * p,
              t: fc.t + (tc.t - fc.t) * p,
              w: fc.w + (tc.w - fc.w) * p,
              h: fc.h + (tc.h - fc.h) * p,
              r: fc.r + (tc.r - fc.r) * p
            });
          });
          titleEl.style.top =
            (from.title + (to.title - from.title) * p).toFixed(3) + 'px';
          if (elapsed < dur) requestAnimationFrame(frame);
          else {
            applyState(toIdx);
            current = toIdx;
            animating = false;
          }
        })(performance.now());
      } else {
        // CSS-transition: один шаг с указанным duration/easing.
        var dur = opts.duration || 300;
        var ease = opts.easing || 'ease-out';
        var props = ['top', 'width', 'height', 'transform'];
        var trans = props.map(function (p) { return p + ' ' + dur + 'ms ' + ease; }).join(', ');
        IDX.forEach(function (i) { els[i].style.transition = trans; });
        titleEl.style.transition = 'top ' + dur + 'ms ' + ease;
        // Применяем целевые значения уже в следующем кадре, чтобы браузер
        // успел зафиксировать transition-стиль до изменения свойств.
        requestAnimationFrame(function () { applyState(toIdx); });
        setTimeout(function () {
          IDX.forEach(function (i) { els[i].style.transition = ''; });
          titleEl.style.transition = '';
          current = toIdx;
          animating = false;
        }, dur);
      }
    }

    // Сценарий проигрывается сам:
    //   t = 500мс                → стейт 1 → 2 (веер, спринг 2000мс, k=96 c=6 m=1)
    //   t = 500+2000+800 = 3300мс  → стейт 2 → 3 (в ряд, ease-out 300мс)
    //   t = 3300+300+1   = 3601мс  → стейт 3 → 4 (сдвиг влево, overdamped спринг
    //                                            600мс, k=80 c=20 m=1)
    var PAUSE_BETWEEN = 800;
    var EASE_DUR = 300;
    setTimeout(function () {
      transitionTo(1, { mode: 'spring' });
      setTimeout(function () {
        transitionTo(2, { mode: 'css', duration: EASE_DUR, easing: 'ease-out' });
        // Стейт 3 → 4 запускаем сразу после окончания ease-out
        // (Figma даёт delay 1мс, мы держим небольшой запас, чтобы
        // animating-флаг успел сброситься).
        setTimeout(function () {
          transitionTo(3, { mode: 'spring', k: 80, c: 20, m: 1, duration: 600 });
        }, EASE_DUR + 16);
      }, SPRING.duration + PAUSE_BETWEEN);
    }, SPRING.delay);
  })();
</script>

</body>
</html>
