<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Подарки — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal — определяет направление перехода -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }
  /* fullscreen-оболочка + .ll-icon → components/app-shell.css (flex-column даёт
     базовый .phone-frame). Здесь только фон страницы (secondary). */
  .phone-frame { background: var(--dynamic-surface-base-secondary); }

  /* Контент страницы — позиционируем как relative-контейнер,
     чтобы и заголовок, и стек могли двигаться через transform. */
  .gp {
    position: relative;
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    min-height: 0;
  }

  /* Центральная колонка: title + stack живут в одном column-flex.
     justify-content: flex-end → контент прижат к низу .gp__center;
     стек анимирует свою height, заголовок физически выталкивается вверх. */
  .gp__center {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    min-height: 0;
    position: relative;
  }

  /* Заголовок — обычный поток, по центру. Поднимается за счёт роста стека. */
  .gp__title {
    margin: 0 24px;
    padding-bottom: 24px;
    text-align: center;
    font-size: 28px; line-height: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--dynamic-text-and-icons-base-primary);
    transition: opacity 280ms ease-out;
  }

  /* Стек карточек — позиционируем абсолютные карточки внутри.
     height стартует с компакт-стека и анимируется JS-спрингом. */
  .gp__stack {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: visible;
  }

  /* Все карточки лежат в центре стек-контейнера; смещения дают transform-ы */
  .gp-card {
    position: absolute;
    left: 50%; top: 50%;
    /* Финальный размер карточки в веере — 220×260. На старте всё это
       масштабируется до 150×180 (≈ 0.682), как в Figma.
       Скругление 36px в финале → scale(0.682) даст ≈ 24.5px на старте. */
    width: 220px; height: 260px;
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 12px 28px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.06);
    will-change: transform, opacity;
    /* Пружинка из DS — даёт лёгкий перехлёст в конце переезда, как просили. */
    transition:
      transform 720ms cubic-bezier(0, -0.3, 0.5, 1.3),
      opacity 380ms ease-out;
  }

  /* Стадия 1 — START. Три карточки скомпонованы в компактную стопку
     чуть ниже центра, как на старте анимации в Figma. */
  .gp.__phase-start .gp-card {
    opacity: 0.3;
  }
  /* Старт — уже компактный веер (стак-веером): карточки заметно
     разнесены по углам и tx/ty, но в меньшем масштабе (0.682 = 150/220).
     Цифры повёрнуты под CSS-конвенцию (Figma положительный = CCW). */
  .gp.__phase-start .gp-card[data-i="0"] {
    transform: translate(-65%, -32%) scale(0.682) rotate(6deg);
  }
  .gp.__phase-start .gp-card[data-i="1"] {
    transform: translate(-35%, -26%) scale(0.682) rotate(0.5deg);
  }
  .gp.__phase-start .gp-card[data-i="2"] {
    transform: translate(-52%, -10%) scale(0.682) rotate(9deg);
  }

  /* Стадия 2 — FAN. Карточки разъезжаются в веер и масштабируются вверх.
     z-index сверху вниз: i=0 (Виктория, спасибо) сзади-слева,
     i=1 (Мария, любимая) — справа в среднем плане,
     i=2 (Дмитрий, котик) — впереди и крупнее. */
  .gp-card[data-i="2"] { z-index: 3; }
  .gp-card[data-i="1"] { z-index: 2; }
  .gp-card[data-i="0"] { z-index: 1; }

  /* Финальные повороты — из Figma, знаки инвертированы для CSS.
     Виктория и Дмитрий вращаются «налево» (CCW = отрицательный CSS),
     Мария — «направо» (CW = положительный CSS). Размер 220×260 (scale 1). */
  .gp.__phase-fan .gp-card[data-i="0"] {
    /* Figma +7.21° → CSS -7.21° */
    transform: translate(-78%, -68%) scale(1) rotate(-7.21deg);
    transition-delay: 60ms;
  }
  .gp.__phase-fan .gp-card[data-i="1"] {
    /* Figma -15° → CSS +15° */
    transform: translate(-22%, -52%) scale(1) rotate(15deg);
    transition-delay: 120ms;
  }
  .gp.__phase-fan .gp-card[data-i="2"] {
    /* Figma +16° → CSS -16° */
    transform: translate(-52%, -20%) scale(1) rotate(-16deg);
    transition-delay: 180ms;
  }

  /* Стадия 3 — ACCEPTED. Карточки улетают вверх со стэгером. */
  .gp.__phase-accepted .gp-card {
    transition:
      transform 620ms cubic-bezier(.5, 0, .75, 0),
      opacity 380ms ease-in;
  }
  .gp.__phase-accepted .gp-card[data-i="2"] {
    transform: translate(-52%, -300%) scale(1) rotate(28deg);
    opacity: 0; transition-delay: 0ms;
  }
  .gp.__phase-accepted .gp-card[data-i="1"] {
    transform: translate(-22%, -300%) scale(1) rotate(-26deg);
    opacity: 0; transition-delay: 80ms;
  }
  .gp.__phase-accepted .gp-card[data-i="0"] {
    transform: translate(-78%, -300%) scale(1) rotate(20deg);
    opacity: 0; transition-delay: 160ms;
  }
  .gp.__phase-accepted .gp__title {
    opacity: 0; transform: translateY(-6px);
  }

  /* Контент карточки */
  .gp-card__head {
    position: absolute; top: 10px; left: 10px; right: 36px;
    display: flex; align-items: center; gap: 6px; z-index: 2;
  }
  .gp-card__head .avatar { width: 20px; height: 20px; border-radius: 50%; overflow: hidden; flex: 0 0 auto; background: #eee; }
  .gp-card__head .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gp-card__head .name {
    font-size: 11px; line-height: 14px; font-weight: 600;
    color: rgba(0,0,0,.72);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .gp-card__trash {
    position: absolute; top: 6px; right: 6px;
    width: 28px; height: 28px; border: 0; padding: 0;
    border-radius: 50%; background: rgba(255,255,255,.72);
    backdrop-filter: blur(8px); cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 3;
  }
  .gp-card__trash img { width: 16px; height: 16px; }
  .gp-card__poster {
    position: absolute; left: 0; right: 0; top: 36px; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 12px;
    color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .gp-card[data-i="0"] .gp-card__poster {
    background: linear-gradient(140deg, #ff6fa3 0%, #c2185b 100%);
  }
  .gp-card[data-i="1"] .gp-card__poster {
    background: linear-gradient(140deg, #fff1d6 0%, #ffb7a3 60%, #ff8a65 100%);
    color: #6a3b1c; text-shadow: 0 1px 0 rgba(255,255,255,.4);
  }
  .gp-card[data-i="2"] .gp-card__poster {
    background: linear-gradient(140deg, #a07a55 0%, #5e4226 100%);
  }
  .gp-card__poster .emoji {
    font-size: 56px; line-height: 1; margin-bottom: 6px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.2));
  }
  .gp-card__poster .text {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; font-weight: 700;
    font-size: 22px; line-height: 26px; letter-spacing: -0.01em;
  }

  /* Нижний CTA — обёртка вокруг DS-кнопки button-wrapper.
     Отступ снизу 36px — расстояние от кнопки до home-indicator. */
  .gp__bottom {
    padding: 12px 16px 36px;
    transition: opacity 240ms ease-out;
  }
  /* Растягиваем DS-обёртку и кнопку внутри — на 100% родителя. */
  .gp__bottom > .button-wrapper { width: 100%; }
  .gp__bottom > .button-wrapper > .button-container { width: 100%; }
  .gp.__phase-accepted .gp__bottom {
    opacity: 0; pointer-events: none;
  }

  /* Финальный экран — «Вы приняли все подарки» + конфетти */
  .gp__final {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 360ms ease-out 420ms;
  }
  .gp.__phase-accepted .gp__final {
    opacity: 1; pointer-events: auto;
  }
  .gp__final-title {
    font-size: 28px; line-height: 32px; font-weight: 700;
    text-align: center; letter-spacing: -0.01em;
    color: var(--dynamic-text-and-icons-base-primary);
  }
  /* Кнопка «Готово» — DS-обёртка, тянем по горизонтали через width
     (родитель — column flex, поэтому __full-width не подходит). */
  .gp__done {
    display: block;
    width: calc(100% - 32px);
    margin: 0 16px;
  }
  .gp__done .button-container { width: 100%; }

  /* Конфетти */
  .gp-confetti {
    position: relative; width: 240px; height: 120px;
  }
  .gp-confetti i {
    position: absolute; top: 50%; left: 50%;
    width: 10px; height: 10px; border-radius: 2px;
    transform: translate(-50%, -50%) scale(0); opacity: 0;
  }
  .gp.__phase-accepted .gp-confetti i {
    animation: gp-confetti-burst 1200ms cubic-bezier(.2,.7,.2,1) forwards;
    animation-delay: calc(var(--d, 0ms) + 420ms);
  }
  @keyframes gp-confetti-burst {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(0); opacity: 0; }
    20%  { opacity: 1; }
    100% {
      transform: translate(calc(-50% + var(--x, 0px)), calc(-50% + var(--y, 0px)))
                 scale(1) rotate(var(--r, 360deg));
      opacity: 0;
    }
  }

  /* Home-indicator iOS */
  .gp__handle {
    height: 24px; position: relative;
  }
  .gp__handle::after {
    content: '';
    position: absolute; bottom: 8px; left: 50%;
    width: 134px; height: 5px; border-radius: 3px;
    background: var(--dynamic-text-and-icons-base-primary);
    transform: translateX(-50%);
    opacity: .9;
  }

  /* Уменьшаем анимации, если пользователь попросил */
  @media (prefers-reduced-motion: reduce) {
    .gp-card, .gp__title, .gp__bottom, .gp__final, .gp-confetti i {
      transition: none !important;
      animation: none !important;
    }
  }
</style>
</head>
<body>

<div class="phone-frame __fullscreen">

  <!-- STATUS + NAVBAR с крестиком справа -->
  <div class="meshok-up">
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <span class="status-bar__indicators">
        <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
        <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">

    </div>

    <div class="nav-bar __type-feed">

               data-action="back": back-button.js + screen-transition.js
               навесят два слушателя и history.back() дёрнется дважды. -->
          <button class="button-inline __size-24 nav-bar__back" aria-label="Закрыть">

      <article class="gp-card" data-i="1">

          <span class="name">Мария Иванова</span>

</div>

<!-- DS back-кнопка → history.back() с правильным направлением -->
<script src="components/back-button.js"></script>
<!-- Анимация подарков: физический спринг для перехода start → fan. -->
<script>
  (function () {
    var root = document.getElementById('gp');
    var cta  = document.getElementById('gpAcceptAll');
    var confettiHost = document.getElementById('gpConfetti');
    if (!root) return;

    // Конфетти на финальный экран
    (function buildConfetti() {
      var colors = ['#ff6fa3', '#ffb547', '#3da9fc', '#7bd389', '#c084fc', '#ff6b6b'];
      var N = 28;
      for (var i = 0; i < N; i++) {
        var p = document.createElement('i');
        var ang = (Math.PI * 2 * i) / N + (Math.random() - 0.5) * 0.4;
        var dist = 80 + Math.random() * 60;
        var x = Math.cos(ang) * dist;
        var y = Math.sin(ang) * dist - 10;
        var r = (Math.random() * 720 - 360) | 0;
        p.style.background = colors[i % colors.length];
        p.style.setProperty('--x', x.toFixed(0) + 'px');
        p.style.setProperty('--y', y.toFixed(0) + 'px');
        p.style.setProperty('--r', r + 'deg');
        p.style.setProperty('--d', (Math.random() * 240).toFixed(0) + 'ms');
        confettiHost.appendChild(p);
      }
    })();

    // ────────────────────────────────────────────────────────────────
    // СПРИНГ: stiffness=96, damping=6, mass=1, длительность 2000 мс,
    // задержка перед стартом 500 мс. ζ ≈ 0.306 → недодемпфированный,
    // есть лёгкий перехлёст с осцилляцией.
    // Две параллельные дорожки: opacity (линейно 0.3 → 1 за 2000мс)
    // и position (спринг). Никаких промежуточных стадий.
    // ────────────────────────────────────────────────────────────────
    var SPRING = { k: 96, c: 6, m: 1, duration: 2000, delay: 500 };
    var omega0 = Math.sqrt(SPRING.k / SPRING.m);
    var zeta   = SPRING.c / (2 * Math.sqrt(SPRING.k * SPRING.m));
    var omegaD = omega0 * Math.sqrt(Math.max(0, 1 - zeta * zeta));

    function springProgress(tMs) {
      var t = tMs / 1000;
      if (zeta < 1) {
        return 1 - Math.exp(-zeta * omega0 * t) *
          (Math.cos(omegaD * t) + (zeta * omega0 / omegaD) * Math.sin(omegaD * t));
      }
      return 1 - (1 + omega0 * t) * Math.exp(-omega0 * t);
    }

    // Старт — уже компактный веер (стак-веером), не глухая стопка.
    // Финал — раскрытый веер. Всего 2 шага, между ними один спринг.
    var CARDS = [
      { i: 0, from: { tx: -65, ty: -32, sc: 0.682, rot:  6     },
              to:   { tx: -78, ty: -68, sc: 1,    rot: -7.21 } },
      { i: 1, from: { tx: -35, ty: -26, sc: 0.682, rot:  0.5   },
              to:   { tx: -22, ty: -52, sc: 1,    rot:  15   } },
      { i: 2, from: { tx: -52, ty: -10, sc: 0.682, rot:  9     },
              to:   { tx: -52, ty: -20, sc: 1,    rot: -16   } }
    ];
    var els = CARDS.map(function (c) {
      return root.querySelector('.gp-card[data-i="' + c.i + '"]');
    });
    var stackEl = root.querySelector('.gp__stack');
    function apply(el, s) {
      el.style.transform =
        'translate(' + s.tx.toFixed(3) + '%, ' + s.ty.toFixed(3) + '%) ' +
        'scale(' + s.sc.toFixed(4) + ') ' +
        'rotate(' + s.rot.toFixed(3) + 'deg)';
    }

    // Стек растёт по высоте: 220 → 440 (≈ x2). За счёт justify-content:flex-end
    // на родителе .gp__center заголовок физически выталкивается наверх по мере
    // увеличения высоты стека.
    var STACK_H_FROM = 220;
    var STACK_H_TO   = 440;
    stackEl.style.height = STACK_H_FROM + 'px';

    // 1) Зафиксируем старт инлайн-стилями, чтобы CSS-rule .__phase-start
    //    нам не мешал — спринг полностью ведёт transform/opacity сам.
    CARDS.forEach(function (c, idx) {
      apply(els[idx], c.from);
      els[idx].style.opacity = '0.3';
    });

    // 2) Подождём delay, потом запустим спринг. Карточки разлетаются веером
    //    и параллельно стек растёт по высоте — заголовок поедет наверх сам.
    setTimeout(function () {
      root.classList.remove('__phase-start');
      root.classList.add('__phase-fan');

      var t0 = performance.now();
      function frame(now) {
        var elapsed = Math.min(SPRING.duration, now - t0);
        var p = springProgress(elapsed);
        CARDS.forEach(function (c, idx) {
          var s = {
            tx:  c.from.tx  + (c.to.tx  - c.from.tx)  * p,
            ty:  c.from.ty  + (c.to.ty  - c.from.ty)  * p,
            sc:  c.from.sc  + (c.to.sc  - c.from.sc)  * p,
            rot: c.from.rot + (c.to.rot - c.from.rot) * p
          };
          apply(els[idx], s);
        });
        // Стек растёт по той же spring-кривой → толкает заголовок наверх.
        stackEl.style.height = (STACK_H_FROM + (STACK_H_TO - STACK_H_FROM) * p).toFixed(2) + 'px';

        // Прозрачность — параллельная независимая дорожка, линейно за duration.
        var op = (0.3 + 0.7 * (elapsed / SPRING.duration)).toFixed(3);
        CARDS.forEach(function (_, idx) { els[idx].style.opacity = op; });

        if (elapsed < SPRING.duration) requestAnimationFrame(frame);
        else {
          // Финальное точное состояние.
          CARDS.forEach(function (c, idx) { apply(els[idx], c.to); els[idx].style.opacity = '1'; });
          stackEl.style.height = STACK_H_TO + 'px';
        }
      }
      requestAnimationFrame(frame);
    }, SPRING.delay);

    // «Принять все» → переход к __phase-accepted (улёт + конфетти через CSS).
    cta.addEventListener('click', function () {
      // Сначала на всякий случай зачистим инлайн-стили (если спринг ещё идёт),
      // иначе CSS-transition в __phase-accepted не сработает.
      CARDS.forEach(function (c, idx) {
        els[idx].style.transform = '';
        els[idx].style.opacity = '';
      });
      root.classList.remove('__phase-fan');
      root.classList.add('__phase-accepted');
    });
  })();
</script>

</body>
</html>
