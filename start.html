<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Запуск — прототип</title>
<style>
  :root {
    --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
          "Helvetica Neue", "Segoe UI", Roboto, system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #000;
    font-family: var(--sf);
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ============================================================
     Device — full-viewport iPhone canvas
     ============================================================ */
  .device {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    overflow: hidden;
    background: #000;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Dynamic Island — black pill at the top, above everything */
  .dynamic-island {
    position: absolute;
    top: 11px; left: 50%;
    transform: translateX(-50%);
    width: 125px; height: 35px;
    background: #000;
    border-radius: 20px;
    z-index: 80;
    pointer-events: none;
  }

  /* Shared status bar — sits on top of every screen */
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 60;
    color: #fff;
    pointer-events: none;
  }
  .statusbar__time {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2px;
    font-variant-numeric: tabular-nums;
  }
  .statusbar__right { display: flex; align-items: center; gap: 7px; }
  .statusbar__right svg { display: block; }

  /* ============================================================
     Wallpaper — shared ambient gradient with soft colour blobs
     ============================================================ */
  .wallpaper {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 80% at 80% -10%, #3a2d6b 0%, transparent 55%),
      radial-gradient(120% 90% at -10% 110%, #6b2d4f 0%, transparent 55%),
      radial-gradient(100% 70% at 50% 50%, #1c1c3a 0%, transparent 70%),
      linear-gradient(160deg, #0e0e1f 0%, #161427 45%, #0b0b16 100%);
  }
  .wallpaper::after {
    /* subtle film grain / vignette */
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,0.45) 100%);
  }

  /* ============================================================
     SCREEN 1 — Lock screen
     ============================================================ */
  .lockscreen {
    position: absolute;
    inset: 0;
    z-index: 40;
    color: #fff;
    transition: transform 0.55s cubic-bezier(0.32, 0.72, 0, 1),
                opacity 0.45s ease;
    will-change: transform;
  }
  .device.unlocked .lockscreen {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
  }

  .lockscreen__clock {
    position: absolute;
    top: 78px; left: 0; right: 0;
    text-align: center;
    text-shadow: 0 2px 24px rgba(0,0,0,0.28);
  }
  .lockscreen__date {
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.3px;
    opacity: 0.95;
    margin-bottom: 2px;
  }
  .lockscreen__time {
    font-size: 92px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1.0;
    font-variant-numeric: tabular-nums;
  }

  .lockscreen__lock {
    position: absolute;
    top: 56px; left: 50%;
    transform: translateX(-50%);
    opacity: 0.92;
  }

  /* Bottom widgets — torch + camera quick buttons (decorative) */
  .lockscreen__quick {
    position: absolute;
    bottom: 96px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
  }
  .quick-btn {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(40, 40, 50, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }

  /* Home indicator + swipe hint */
  .home-indicator {
    position: absolute;
    bottom: 9px; left: 50%;
    transform: translateX(-50%);
    width: 140px; height: 5px;
    border-radius: 3px;
    background: #fff;
    z-index: 70;
  }
  .lockscreen__hint {
    position: absolute;
    bottom: 30px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    opacity: 0.65;
    animation: hintPulse 2.4s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50%      { opacity: 0.85; transform: translateY(-3px); }
  }

  /* ============================================================
     SCREEN 2 — Home screen (menu)
     ============================================================ */
  .homescreen {
    position: absolute;
    inset: 0;
    z-index: 20;
    opacity: 0;
    transform: scale(1.06);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    pointer-events: none;
  }
  .device.unlocked .homescreen {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .homescreen .wallpaper { filter: brightness(0.92) saturate(1.05); }

  .home-grid {
    position: absolute;
    top: 92px; left: 0; right: 0;
    padding: 0 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px 18px;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    background: none; border: none;
    color: #fff;
    font-family: var(--sf);
  }
  .app__icon {
    position: relative;
    width: 62px; height: 62px;
    border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 14px rgba(0,0,0,0.32);
    overflow: hidden;
    transition: transform 0.18s ease;
  }
  /* iOS squircle highlight */
  .app__icon::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.35),
                inset 0 -1px 2px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .app:active .app__icon { transform: scale(0.9); }
  .app__label {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* App icon — «Лента» (classic OK orange) */
  .icon-lenta {
    background: linear-gradient(160deg, #ff9d2f 0%, #ff7a00 48%, #f5550a 100%);
  }
  /* App icon — «Лента Light» (clean white/light) */
  .icon-lenta-light {
    background: linear-gradient(160deg, #ffffff 0%, #f0f1f5 100%);
  }

  /* Dock */
  .dock {
    position: absolute;
    left: 12px; right: 12px; bottom: 26px;
    height: 92px;
    border-radius: 34px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(28px) saturate(1.6);
    -webkit-backdrop-filter: blur(28px) saturate(1.6);
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    padding: 0 18px;
  }
  .dock .app__icon { box-shadow: 0 4px 10px rgba(0,0,0,0.28); }

  /* Decorative dock app gradients */
  .icon-phone    { background: linear-gradient(160deg, #61e063 0%, #1faa3f 100%); }
  .icon-messages { background: linear-gradient(160deg, #5ef07a 0%, #15c04a 100%); }
  .icon-safari   { background: linear-gradient(160deg, #1fb6ff 0%, #0a72e6 100%); }
  .icon-music    { background: linear-gradient(160deg, #fb5c74 0%, #fa233b 100%); }

  /* ============================================================
     App-launch animation — tapped icon zooms to fill the screen
     ============================================================ */
  .launch {
    position: absolute;
    z-index: 90;
    border-radius: 15px;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 6px 14px rgba(0,0,0,0.32);
  }
  .launch.is-animating {
    opacity: 1;
    animation: appLaunch 0.42s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes appLaunch {
    0%   { /* set inline from JS as starting rect */ }
    100% {
      top: 0; left: 0;
      width: 100%; height: 100dvh;
      border-radius: 0;
    }
  }
  .launch__glyph {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 1;
    transition: opacity 0.3s ease 0.12s;
  }
  .launch.is-animating .launch__glyph { opacity: 0; }
</style>
</head>
<body>

<div class="device" id="device">

  <!-- Dynamic Island -->
  <div class="dynamic-island"></div>

  <!-- Shared status bar -->
  <div class="statusbar">
    <span class="statusbar__time">9:41</span>
    <span class="statusbar__right">
      <!-- signal -->
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5.5" width="3" height="6.5" rx="1"/><rect x="10" y="3" width="3" height="9" rx="1"/><rect x="15" y="0.5" width="3" height="11.5" rx="1"/></svg>
      <!-- wifi -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 2.2c2.7 0 5.2 1 7.1 2.7.3.3.3.7 0 1l-.9.9c-.3.3-.7.3-1 0a8 8 0 0 0-10.4 0c-.3.3-.7.3-1 0l-.9-.9c-.3-.3-.3-.7 0-1A10.6 10.6 0 0 1 8.5 2.2Z"/><path d="M8.5 6.1c1.5 0 2.9.5 3.9 1.5.3.3.3.7 0 1l-1 1c-.2.2-.6.2-.9 0a3 3 0 0 0-4 0c-.3.2-.7.2-.9 0l-1-1c-.3-.3-.3-.7 0-1a5.6 5.6 0 0 1 3.9-1.5Z"/><circle cx="8.5" cy="10.5" r="1.4"/></svg>
      <!-- battery -->
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#fff" stroke-opacity="0.5"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#fff"/><path d="M24.5 4.5c1 .3 1 3.7 0 4" stroke="#fff" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round"/></svg>
    </span>
  </div>

  <!-- ========================= LOCK SCREEN ========================= -->
  <div class="lockscreen" id="lockscreen">
    <div class="wallpaper"></div>

    <div class="lockscreen__lock">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M12 1.5a5.5 5.5 0 0 0-5.5 5.5v2.2A3 3 0 0 0 4 12.2v6.3a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-6.3a3 3 0 0 0-2.5-2.96V7A5.5 5.5 0 0 0 12 1.5Zm3.5 7.7h-7V7a3.5 3.5 0 0 1 7 0v2.2Z"/></svg>
    </div>

    <div class="lockscreen__clock">
      <div class="lockscreen__date" id="lockDate">среда, 10 июня</div>
      <div class="lockscreen__time">9:41</div>
    </div>

    <div class="lockscreen__quick">
      <div class="quick-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M9 2h6l-.5 9h2l-6 11 1.5-8H10L9 2z"/></svg>
      </div>
      <div class="quick-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M9 4l-1.2 2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3.8L15 4H9zm3 5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9z"/></svg>
      </div>
    </div>

    <div class="lockscreen__hint">Смахните вверх, чтобы открыть</div>
  </div>

  <!-- ========================= HOME SCREEN ========================= -->
  <div class="homescreen" id="homescreen">
    <div class="wallpaper"></div>

    <div class="home-grid">
      <!-- Лента → lenta.html -->
      <button class="app" data-href="lenta.html">
        <span class="app__icon icon-lenta">
          <svg width="34" height="34" viewBox="0 0 36 36" fill="none">
            <rect x="7"  y="9"  width="22" height="4" rx="2" fill="#fff"/>
            <rect x="7"  y="16" width="22" height="4" rx="2" fill="#fff" fill-opacity="0.92"/>
            <rect x="7"  y="23" width="14" height="4" rx="2" fill="#fff" fill-opacity="0.85"/>
          </svg>
        </span>
        <span class="app__label">Лента</span>
      </button>

      <!-- Лента Light → lenta-light.html -->
      <button class="app" data-href="lenta-light.html">
        <span class="app__icon icon-lenta-light">
          <svg width="34" height="34" viewBox="0 0 36 36" fill="none">
            <rect x="7"  y="9"  width="22" height="4" rx="2" fill="#ff7a00"/>
            <rect x="7"  y="16" width="22" height="4" rx="2" fill="#ff7a00" fill-opacity="0.85"/>
            <rect x="7"  y="23" width="14" height="4" rx="2" fill="#ff7a00" fill-opacity="0.7"/>
          </svg>
        </span>
        <span class="app__label">Лента Light</span>
      </button>
    </div>

    <!-- Dock (decorative) -->
    <div class="dock">
      <span class="app__icon icon-phone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M6.6 3.5 4 6.1c-.4.4-.5 1-.3 1.5a18 18 0 0 0 9.2 9.2c.5.2 1.1.1 1.5-.3l2.6-2.6c.4-.4.4-1 0-1.4l-2.4-2.4c-.4-.4-1-.4-1.4 0l-1 1a14 14 0 0 1-4.7-4.7l1-1c.4-.4.4-1 0-1.4L5.9 3.5c-.4-.4-1-.4-1.3 0z" transform="translate(1 1)"/></svg>
      </span>
      <span class="app__icon icon-messages">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M12 4C7 4 3 7.4 3 11.6c0 2.3 1.2 4.3 3.2 5.7-.2 1-.8 2.2-1.6 3 1.6-.2 3-.8 4-1.5 1 .3 2.2.5 3.4.5 5 0 9-3.4 9-7.7S17 4 12 4z"/></svg>
      </span>
      <span class="app__icon icon-safari">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="9" fill="none" stroke="#fff" stroke-width="1.4"/><path d="m15.5 8.5-5 2-2 5 5-2z"/></svg>
      </span>
      <span class="app__icon icon-music">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M9 17.5V7l9-2v9.2M9 17.5a2.2 2.2 0 1 1-3-2 2.2 2.2 0 0 1 3 2zm9-3.3a2.2 2.2 0 1 1-3-2 2.2 2.2 0 0 1 3 2z" fill="none" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </span>
    </div>
  </div>

  <!-- Home indicator (always on top) -->
  <div class="home-indicator"></div>

  <!-- Launch-zoom layer (positioned & filled from JS) -->
  <div class="launch" id="launch"><span class="launch__glyph" id="launchGlyph"></span></div>

</div>

<script>
(function () {
  var device   = document.getElementById('device');
  var lock     = document.getElementById('lockscreen');
  var launch   = document.getElementById('launch');
  var glyph    = document.getElementById('launchGlyph');

  /* ---- Unlock: tap or swipe-up anywhere on the lock screen ---- */
  function unlock() { device.classList.add('unlocked'); }

  lock.addEventListener('click', unlock);

  var startY = null;
  lock.addEventListener('touchstart', function (e) { startY = e.touches[0].clientY; }, { passive: true });
  lock.addEventListener('touchend', function (e) {
    if (startY === null) return;
    var dy = startY - e.changedTouches[0].clientY;
    if (dy > 40) unlock();
    startY = null;
  }, { passive: true });

  /* ---- Launch an app: zoom the tapped icon to fullscreen, then navigate ---- */
  document.querySelectorAll('.app[data-href]').forEach(function (app) {
    app.addEventListener('click', function () {
      var href = app.getAttribute('data-href');
      var iconEl = app.querySelector('.app__icon');
      var rect = iconEl.getBoundingClientRect();

      // Place the launch layer exactly over the tapped icon
      launch.style.top    = rect.top + 'px';
      launch.style.left   = rect.left + 'px';
      launch.style.width  = rect.width + 'px';
      launch.style.height = rect.height + 'px';
      launch.className = 'launch';                 // reset
      launch.classList.add(iconEl.classList.contains('icon-lenta') ? 'icon-lenta' : 'icon-lenta-light');
      glyph.innerHTML = iconEl.innerHTML;

      // Force reflow so the starting rect is committed before animating
      void launch.offsetWidth;
      launch.classList.add('is-animating');

      launch.addEventListener('animationend', function () {
        window.location.href = href;
      }, { once: true });
    });
  });
})();
</script>

</body>
</html>
