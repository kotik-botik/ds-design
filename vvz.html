<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Найдите друзей — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap">
<link rel="stylesheet" href="index.css">
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }
  .phone-frame { background: var(--dynamic-surface-base-secondary); }

  /* Шапка: компактный nav-bar с centered title — фон prosвечивает */
  .vvz-nav .nav-bar__title {
    color: var(--dynamic-text-and-icons-base-primary);
  }

  /* ============================================================
     Сцена «дека карточек» — занимает всё пространство между шапкой
     и нижней панелью кнопок.
     ============================================================ */
  .vvz-deck {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    min-height: 0;
  }

  /* Карточка-кандидат — DS uni-card по духу, но композиция уникальная
     (фото + центрированный текст + аватары + большая мягкая тень). */
  .vvz-card {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 328px;
    height: 464px;
    margin-left: -164px;
    margin-top: -232px;
    box-sizing: border-box;
    background: var(--dynamic-surface-base-quaternary, #fff);
    border-radius: 16px;
    box-shadow: 0 16px 48px 0 rgba(0, 0, 0, 0.2);
    padding: 16px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: stretch;
    will-change: transform, opacity;
    /* при дёрге убираем переход — JS управляет напрямую */
    transition:
      transform 320ms cubic-bezier(0.2, 0, 0, 1),
      opacity   320ms cubic-bezier(0.2, 0, 0, 1);
  }
  .vvz-card.__dragging { transition: none; }

  .vvz-card__photo {
    position: relative;
    width: 296px;
    height: 296px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(0, 0, 0, 0.08);
    background: var(--dynamic-surface-contrast-low);
  }
  .vvz-card__photo > img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Подсветка-стикер «Дружить / Пропустить» при свайпе */
  .vvz-card__stamp {
    position: absolute;
    top: 16px;
    padding: 6px 12px;
    border: 3px solid currentColor;
    border-radius: 8px;
    font: 700 18px/1 var(--font-family);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    opacity: 0;
    transform: rotate(-12deg);
    pointer-events: none;
  }
  .vvz-card__stamp.__like  { right: 16px; color: var(--static-surface-status-accent, #f50); transform: rotate(-12deg); }
  .vvz-card__stamp.__nope  { left: 16px;  color: var(--dynamic-text-and-icons-base-primary); transform: rotate(12deg); }

  .vvz-card__info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
  }
  .vvz-card__name {
    color: var(--dynamic-text-and-icons-base-primary);
    text-align: center;
    font-weight: 500;
  }
  .vvz-card__meta {
    color: var(--dynamic-text-and-icons-base-secondary);
    text-align: center;
  }

  /* «18 общих друзей» + строка отдельных аватарок 28px, gap 8 */
  .vvz-card__friends {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .vvz-card__friends-label {
    color: var(--dynamic-text-and-icons-base-secondary);
  }
  .vvz-card__friends-list {
    display: flex;
    gap: 8px;
  }
  .vvz-card .avatar { --avatar-size: 28px; }

  /* ============================================================
     Нижняя панель — два круглых button-circle (72px)
     ============================================================ */
  .vvz-actions {
    flex-shrink: 0;
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 40px;
  }
  /* Системный home-indicator (iOS-стиль): 4×108 пилюля по центру 24-px полосы. */
  .vvz-handle {
    flex-shrink: 0;
    position: relative;
    height: 24px;
  }
  .vvz-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    width: 108px;
    height: 4px;
    border-radius: 12px;
    background: var(--dynamic-surface-base-inverse-primary, #2e2f33);
  }
  .vvz-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 72px;
  }
  .vvz-action__label {
    color: var(--dynamic-text-and-icons-base-primary);
    text-align: center;
  }

  /* Состояние «пусто» — когда карточки закончились */
  .vvz-empty {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 24px;
    text-align: center;
    color: var(--dynamic-text-and-icons-base-secondary);
  }
  .vvz-deck.__empty .vvz-empty { display: flex; }
  .vvz-empty__title {
    color: var(--dynamic-text-and-icons-base-primary);
    font-weight: 500;
  }
</style>
</head>
<body>

  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <!-- STATUS + NAVBAR -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>

        <div class="nav-bar vvz-nav">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary">
              <button class="button-inline __size-24 nav-bar__back" aria-label="Закрыть">
                <span class="button-inline__content">
                  <img class="ll-icon button-inline__icon" src="assets/icons/close_24.svg" width="24" height="24" alt="">
                </span>
              </button>
            </span>
          </div>
          <div class="nav-bar__title ds-title-l">Найдите друзей</div>
          <div class="nav-bar__trailing">
            <span class="button-inline-wrapper __size-24 __view-secondary">
              <button class="button-inline __size-24" aria-label="Помощь">
                <span class="button-inline__content">
                  <img class="ll-icon button-inline__icon" src="assets/icons/help_circle_24.svg" width="24" height="24" alt="">
                </span>
              </button>
            </span>
          </div>
        </div>
      </div>

      <!-- ДЕКА КАРТОЧЕК -->
      <div class="vvz-deck" id="vvz-deck">

        <!-- Карточки рендерятся скриптом ниже из data[] -->

        <div class="vvz-empty">
          <div class="vvz-empty__title ds-title-m">Друзей пока больше нет</div>
          <div class="ds-body-m">Загляните позже — мы найдём ещё людей, с которыми у вас много общего.</div>
        </div>
      </div>

      <!-- КНОПКИ ДЕЙСТВИЙ — DS button-circle __size-72 -->
      <div class="vvz-actions">
        <div class="vvz-action">
          <span class="button-circle-wrapper __size-72 __style-secondary">
            <button class="button-circle" id="vvz-skip" aria-label="Пропустить">
              <span class="icon __size-32 __slot-close"></span>
            </button>
          </span>
          <span class="vvz-action__label ds-caption-m">Пропустить</span>
        </div>
        <div class="vvz-action">
          <span class="button-circle-wrapper __size-72 __style-primary">
            <button class="button-circle" id="vvz-like" aria-label="Дружить">
              <span class="icon __size-32 __slot-done"></span>
            </button>
          </span>
          <span class="vvz-action__label ds-caption-m">Дружить</span>
        </div>
      </div>

      <!-- Home indicator -->
      <div class="vvz-handle" aria-hidden="true"></div>
    </div>
  </div>

<script>
(function () {
  // Кандидаты — i.pravatar отдаёт стабильные портреты по img-id.
  // 32-я аватарка из стека «общих друзей» подбирается из соседних,
  // чтобы у каждой карточки была своя тройка.
  var people = [
    { name: 'Карина Затонская',  meta: '28 лет, Рига, Латвия',         photo: 49, mutual: 18, friends: [12, 31, 5] },
    { name: 'Анна Смирнова',     meta: '24 года, Москва, Россия',      photo: 47, mutual: 12, friends: [15, 33, 23] },
    { name: 'Мария Иванова',     meta: '31 год, Санкт-Петербург',       photo: 45, mutual: 10, friends: [14, 22, 18] },
    { name: 'Алёна Ящук',        meta: '26 лет, Минск, Беларусь',      photo: 44, mutual: 20, friends: [7, 11, 27] },
    { name: 'Светлана Орлова',   meta: '29 лет, Алматы, Казахстан',     photo: 32, mutual: 6,  friends: [21, 34, 36] }
  ];

  var deck = document.getElementById('vvz-deck');
  var btnSkip = document.getElementById('vvz-skip');
  var btnLike = document.getElementById('vvz-like');

  // Рендерим только верхние 3 карточки в DOM — нижние ждут очереди.
  // i = 0 — верхняя, i = 1 — за ней, i = 2 — самая глубокая.
  var STACK = 3;
  var idx = 0;

  function render() {
    // Уберём старые карточки (но не .vvz-empty).
    Array.prototype.slice.call(deck.querySelectorAll('.vvz-card')).forEach(function (n) { n.remove(); });

    var live = people.slice(idx, idx + STACK);
    if (!live.length) {
      deck.classList.add('__empty');
      btnSkip.disabled = true;
      btnLike.disabled = true;
      btnSkip.closest('.button-circle-wrapper').classList.add('__state-disabled');
      btnLike.closest('.button-circle-wrapper').classList.add('__state-disabled');
      return;
    }
    // Рендерим в обратном порядке, чтобы верхняя оказалась последним
    // дочерним элементом (выше по z-order без явных z-index'ов).
    for (var i = live.length - 1; i >= 0; i--) {
      deck.appendChild(buildCard(live[i], i));
    }
  }

  function buildCard(p, depth) {
    var card = document.createElement('div');
    card.className = 'vvz-card';
    // depth 0 — верхняя; 1, 2 — отъезд назад по Y и масштабу.
    setDepth(card, depth);

    var avatars = p.friends.map(function (id) {
      return '<div class="avatar __type-image"><img src="https://i.pravatar.cc/56?img=' + id + '" alt=""></div>';
    }).join('');

    card.innerHTML =
      '<div class="vvz-card__photo">' +
        '<img src="https://i.pravatar.cc/600?img=' + p.photo + '" alt="">' +
        '<div class="vvz-card__stamp __like">Дружить</div>' +
        '<div class="vvz-card__stamp __nope">Пропустить</div>' +
      '</div>' +
      '<div class="vvz-card__info">' +
        '<div class="vvz-card__name ds-display-m">' + p.name + '</div>' +
        '<div class="vvz-card__meta ds-caption-m">' + p.meta + '</div>' +
        '<div class="vvz-card__friends">' +
          '<div class="vvz-card__friends-label ds-caption-m">' + p.mutual + ' общих друзей</div>' +
          '<div class="vvz-card__friends-list">' + avatars + '</div>' +
        '</div>' +
      '</div>';

    if (depth === 0) attachDrag(card);
    return card;
  }

  function setDepth(card, depth) {
    // depth 0: на месте; 1: -12px Y и 0.96 scale; 2: -24px Y и 0.92.
    var ty = -depth * 12;
    var s  = 1 - depth * 0.04;
    card.style.transform = 'translate(0px,' + ty + 'px) rotate(0deg) scale(' + s + ')';
    card.style.opacity = depth === 0 ? '1' : (1 - depth * 0.15).toFixed(2);
    card.style.zIndex = String(STACK - depth);
  }

  // Анимированный «вылет» верхней карточки в сторону.
  function fly(direction) {
    var top = deck.querySelector('.vvz-card');
    if (!top) return;
    var dx = direction === 'like' ? 480 : -480;
    var rot = direction === 'like' ? 18 : -18;
    top.style.transform = 'translate(' + dx + 'px,-40px) rotate(' + rot + 'deg)';
    top.style.opacity = '0';
    // Подтягиваем оставшиеся карточки вперёд.
    var rest = Array.prototype.slice.call(deck.querySelectorAll('.vvz-card')).slice(1);
    rest.forEach(function (c, i) { setDepth(c, i); });
    // Через transition-конец — перерисовываем стек целиком.
    setTimeout(function () {
      idx++;
      render();
    }, 320);
  }

  btnSkip.addEventListener('click', function () { fly('skip'); });
  btnLike.addEventListener('click', function () { fly('like'); });

  // ============================================================
  // Drag-свайп верхней карточки — porting от Tinder-pattern'а.
  // ============================================================
  function attachDrag(card) {
    var startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
    var likeStamp = card.querySelector('.__like');
    var nopeStamp = card.querySelector('.__nope');

    function onDown(e) {
      // Не дёргаем drag из тапа по кнопкам в карточке — у нас их нет,
      // но на всякий случай игнорим вторичные пальцы.
      if (e.touches && e.touches.length > 1) return;
      dragging = true;
      var p = pointFromEvent(e);
      startX = p.x; startY = p.y; dx = 0; dy = 0;
      card.classList.add('__dragging');
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    }

    function onMove(e) {
      if (!dragging) return;
      var p = pointFromEvent(e);
      dx = p.x - startX;
      dy = p.y - startY;
      var rot = dx / 16;
      card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + rot + 'deg)';
      // Прозрачность стампов в зависимости от направления и силы.
      var t = Math.min(1, Math.abs(dx) / 120);
      likeStamp.style.opacity = dx > 0 ? t.toFixed(2) : '0';
      nopeStamp.style.opacity = dx < 0 ? t.toFixed(2) : '0';
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('__dragging');
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);

      if (dx > 120) { fly('like'); return; }
      if (dx < -120) { fly('skip'); return; }
      // Возвращаемся на место.
      card.style.transform = 'translate(0,0) rotate(0)';
      likeStamp.style.opacity = '0';
      nopeStamp.style.opacity = '0';
    }

    function pointFromEvent(e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    card.addEventListener('pointerdown', onDown);
  }

  render();
})();
</script>
</body>
</html>
